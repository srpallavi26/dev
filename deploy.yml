- name: Deploy Maven Artifact
  hosts: web
  gather_facts: no
  tasks:
    - name: Copy JAR file
      command: sudo cp "/var/lib/jenkins/workspace/maven deploy/maven-example/target/maven-example-1.0-SNAPSHOT.jar" /opt/maven-example-1.0-SNAPSHOT.jar

    - name: Run application
      command: sudo java -jar /opt/maven-example-1.0-SNAPSHOT.jar &
